name: Build bootc image

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    name: Build, push, and sign Fedora bootc image
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    env:
      IMAGE_NAME: ${{ github.repository }}
      REGISTRY: ghcr.io

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build image
        id: build-image
        uses: redhat-actions/buildah-build@v2
        with:
          image: ${{ env.IMAGE_NAME }}
          tags: |
            latest
            ${{ github.sha }}
          containerfiles: |
            ./Containerfile

      - name: Log in to GHCR
        uses: redhat-actions/podman-login@v1
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push image
        id: push
        uses: redhat-actions/push-to-registry@v2
        with:
          image: ${{ steps.build-image.outputs.image }}
          tags: ${{ steps.build-image.outputs.tags }}
          registry: ${{ env.REGISTRY }}

      - name: Install cosign
        uses: sigstore/cosign-installer@v3.9.1
        with:
          cosign-release: v2.6.1

      - name: Write cosign key
        env:
          COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
        run: |
          cat > cosign.key <<'EOF'
          ${{ secrets.COSIGN_PRIVATE_KEY }}
          EOF
          chmod 600 cosign.key

      - name: Sign image with Cosign (key pair)
        env:
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
          REGISTRY_PATH: ${{ steps.push.outputs.registry-path }}
          DIGEST: ${{ steps.push.outputs.digest }}
        run: |
          cosign sign --yes --key cosign.key "${REGISTRY_PATH}@${DIGEST}"
